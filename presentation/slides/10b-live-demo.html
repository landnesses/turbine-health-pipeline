<div class="slide-inner shell"
  style="display:flex; flex-direction:column; height: calc(100vh - 100px); padding: 0; overflow: hidden;">
  <div class="slide-header"
    style="padding: 26px 30px 16px 30px; border-bottom: 1px solid var(--line); background: var(--panel);">
    <div
      style="font-size: 0.8rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);">
      Prototype</div>
    <h2 style="margin-top: 4px; font-size: 2.8rem; color: var(--ink);">Live System Demonstration</h2>
  </div>

  <div class="slide-body" style="flex: 1; position: relative; background: rgba(255, 255, 255, 0.9);">
    <!-- Placeholder/Loader: hidden when iframe loads -->
    <div id="demo-loader"
      style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; background: rgba(255,255,255,0.95);">
      <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--teal); margin-bottom: 1rem;"></i>
      <p style="color: var(--muted); font-weight: 600;">Loading Turbine Health Monitor...</p>
      <a id="demo-fallback" href="/app" target="_blank" style="margin-top: 1rem; font-size: 0.9rem; color: var(--teal);">若无法加载，请点击此处在新标签页打开</a>
    </div>

    <!-- Live Application Iframe: localhost:8080 uses /app, {{DEMO_APP_URL}} when deployed -->
    <iframe id="demo-iframe" data-src="{{DEMO_APP_URL}}" frameborder="0"
      style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;"
      allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
    </iframe>
    <script>
      (function(){
        var iframe = document.getElementById('demo-iframe');
        var loader = document.getElementById('demo-loader');
        if (!iframe) return;
        var url;
        if ((location.hostname === 'localhost' || location.hostname === '127.0.0.1') && location.port === '8080') {
          url = location.origin + '/app/';
        } else if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
          url = 'http://localhost:8501/';
        } else {
          url = iframe.getAttribute('data-src') || 'https://yyeahoung-turbine-health-pipeline.hf.space';
        }
        iframe.src = url;
        iframe.onload = function(){ if (loader) loader.style.display = 'none'; };
        setTimeout(function(){ if (loader) loader.style.display = 'none'; }, 8000);
      })();
    </script>
  </div>
</div>
